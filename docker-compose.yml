name: matrikkel-geoserver

services:
  geoserver:
    build:
      context: .
      dockerfile: app/Dockerfile
      secrets:
        - kv_packages_pat
        - github_user
    container_name: matrikkel-geoserver
    environment:
      KART_DB_DATABASE: ${KART_DB_DATABASE}
      KART_DB_HOST: ${KART_DB_HOST}
      KART_DB_PORT: ${KART_DB_PORT}
      KART_DB_SCHEMA: ${KART_DB_SCHEMA}
      KART_DB_USERNAME: ${KART_DB_USERNAME}
      KART_DB_PASSWORD: ${KART_DB_PASSWORD}
      GEOSERVER_PORT: ${GEOSERVER_PORT}
      SKIP_DEMO_DATA: true
      JAVA_OPTS: -DALLOW_ENV_PARAMETRIZATION=true
    read_only: true
    tmpfs:
      - /tmp:exec
    # Kun bundet til 127.0.0.1 – admin-UI og setup-skript fra host-maskinen,
    # men ikke eksponert på nettverket. Offentlig trafikk går via auth-proxy.
    ports:
      - "127.0.0.1:${GEOSERVER_PORT}:8080"

  auth-proxy:
    build: ./auth-proxy
    container_name: auth-proxy
    read_only: true
    environment:
      KEYCLOAK_ISSUER_URL: ${KEYCLOAK_ISSUER_URL}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      ACCEPTED_AUDIENCES: ${ACCEPTED_AUDIENCES}
      GEOSERVER_URL: ${GEOSERVER_URL}
      HEALTH_ENDPOINT: ${HEALTH_ENDPOINT}
      PORT: ${AUTH_PROXY_PORT}
    ports:
      - "${AUTH_PROXY_PORT}:${AUTH_PROXY_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      geoserver:
        condition: service_started
secrets:
  kv_packages_pat:
    environment: KV_PACKAGES_PAT
  github_user:
    environment: GITHUB_USER

