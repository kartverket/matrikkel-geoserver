name: "[geoserver] Build and deploy"

on:
  push:
    paths:
      - .github/workflows/**
      - .skip/**
      - app/**
      - auth-proxy/**
      - buildSrc/**
      - gradle/libs.versions.toml
      - utils/**
  workflow_dispatch:

env:
  CI: true
  TZ: Europe/Oslo
  SLACK_CHANNEL: C04SQEX2858

concurrency:
  group: geoserver-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version-string.outputs.version }}
      image: ${{ steps.version-string.outputs.image }}
      auth-proxy-image: ${{ steps.version-string.outputs.auth-proxy-image }}

    steps:
      - name: Generate version string
        id: version-string
        shell: bash
        run: |
          version="$(date -u '+%Y.%m.%d-%H.%M')-$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/kartverket/matrikkel-geoserver:${version}" >> "$GITHUB_OUTPUT"
          echo "auth-proxy-image=ghcr.io/kartverket/matrikkel-geoserver-auth-proxy-image:${version}" >> "$GITHUB_OUTPUT"

  test-geoserver:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-auth-proxy:
    name: Build and run auth-proxy tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-proxy

    steps:
      - uses: actions/checkout@v7

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify linting
        run: bun lint

      - name: Run tests
        run: bun test

  package-image:
    name: Build and (conditionally) Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - version
      - test-geoserver
      - build-auth-proxy
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Build Docker image
        uses: docker/build-push-action@v7
        env:
          image: ${{ needs.version.outputs.image }}
        with:
          context: .
          file: app/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Auth Docker image
        uses: docker/build-push-action@v7
        env:
          auth-proxy-image: ${{ needs.version.outputs.auth-proxy-image }}
        with:
          context: ./auth-proxy
          file: Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.auth-proxy-image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag commit med artifaktversjon
        if: github.ref == 'refs/heads/main'
        run: |
          git tag ${{ needs.version.outputs.version }}
          git push origin ${{ needs.version.outputs.version }}

  pharos:
    name: Run Pharos
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - version
      - package-image
    permissions:
      actions: read
      packages: read
      contents: read
      security-events: write
    steps:
      - name: "Run Pharos"
        uses: kartverket/pharos@e5a5cf71dd41384d6d62c7d9b387851c0457e81b # v0.6.4
        with:
          image_url: ${{ needs.version.outputs.image }}
          trivy: true
          tfsec: true
          disable_severity_check: true
      - name: "Run Pharos Auth"
        uses: kartverket/pharos@e5a5cf71dd41384d6d62c7d9b387851c0457e81b # v0.6.4
        with:
          image_url: ${{ needs.version.outputs.auth-proxy-image }}
          trivy: true
          tfsec: true
          disable_severity_check: true

  deploy-dev:
    name: "Deploy Dev"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - version
      - package-image
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Deploy to Dev
        uses: kartverket/matrikkel-actions/heimdall-deploy@main
        with:
          cluster: 'atkv3-dev'
          resource: '.skip/dev.yaml'
          var: |
            image=${{ needs.version.outputs.image }},version=${{ needs.version.outputs.version }},auth-proxy-image=${{needs.version.outputs.auth-proxy-image}}

  deploy-qa:
    name: "Deploy Prodtest"
    runs-on: ubuntu-latest
    if: false #github.ref == 'refs/heads/main'
    needs:
      - version
      - deploy-dev
    permissions:
      actions: read
      contents: read
      id-token: write

    steps:
      - name: Deploy to prodtest
        uses: kartverket/matrikkel-actions/heimdall-deploy@main
        with:
          cluster: 'atkv3-prod'
          resource: '.skip/prodtest.yaml'
          var: |
            image=${{ needs.version.outputs.image }},version=${{ needs.version.outputs.version }}

  deploy-prod-notifier:
    name: Slack Notify; Deploy to Production
    runs-on: ubuntu-latest
    if: false #github.ref == 'refs/heads/main'
    needs:
      - version
      - pharos
      - package-image
      - deploy-qa
    outputs:
      messageId: ${{ steps.slack_notify.outputs.messageId }}
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Notify slack (Setup)
        id: slack_notify
        uses: kartverket/matrikkel-actions/slack-approval-notifier/setup-octo@main
        with:
          identity: 'matrikkel-geoserver'
          channel: ${{ env.SLACK_CHANNEL }}
          environment: 'produksjon'
          appDescriptor: atkv3-prod:matrikkel-main:matrikkel-geoserver:${{ needs.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  deploy-prod:
    name: Deploy to prod
    runs-on: ubuntu-latest
    if: false #github.ref == 'refs/heads/main'
    needs:
      - version
      - deploy-prod-notifier
    environment:
      name: production
    permissions:
      actions: read
      contents: read
      id-token: write

    steps:
      - name: Notify slack (Update)
        uses: kartverket/matrikkel-actions/slack-approval-notifier/update-octo@main
        with:
          identity: 'matrikkel-geoserver'
          channel: ${{ env.SLACK_CHANNEL }}
          environment: 'produksjon'
          appDescriptor: atkv3-prod:matrikkel-main:matrikkel-geoserver:${{ needs.version.outputs.version }}
          messageId: ${{ needs.deploy-prod-notifier.outputs.messageId }}
          status: ${{ job.status }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Deploy to production
        uses: kartverket/matrikkel-actions/heimdall-deploy@main
        with:
          cluster: 'atkv3-prod'
          resource: '.skip/prod.yaml'
          var: |
            image=${{ needs.version.outputs.image }},version=${{ needs.version.outputs.version }}
