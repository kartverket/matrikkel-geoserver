apiVersion: skiperator.kartverket.no/v1alpha1
kind: Application
metadata:
  name: matrikkel-geoserver
  namespace: matrikkel-main
spec:
  image: "{{ image }}"
  port: 8080
  ingresses:
    - matrikkel-geoserver.atkv3-dev.kartverket-intern.cloud
  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 1G
    limits:
      memory: 2G

  liveness:
    port: 8080
    path: /geoserver/web
    initialDelay: 10      # default: 0
    failureThreshold: 6   # default: 3
  readiness:
    port: 8080
    path: /geoserver/web
    initialDelay: 10      # default: 0
    failureThreshold: 6   # default: 3

  accessPolicy:
    outbound:
      external:
        - host:  https://downloads.sourceforge.net/project/geoserver/GeoServer

  env:
    - name: INSTALL_EXTENSIONS
      value: "true"
    - name: STABLE_EXTENSIONS
      value: "oracle"
    - name: JAVA_OPTS
      value: "-DALLOW_ENV_PARAMETRIZATION=true"

