apiVersion: skiperator.kartverket.no/v1alpha1
kind: Application
metadata:
  name: matrikkel-geoserver
  namespace: matrikkel-prodtest
spec:
  image: "{{ image }}"
  port: 8080
  ingresses:
    - matrikkel-geoserver-prodtest.atkv3-prod.kartverket-intern.cloud
  replicas:
    min: 2
    max: 4

  resources:
    requests:
      cpu: 100m
      memory: 4G
    limits:
      memory: 6G

  liveness:
    port: 8602
    path: /health
    initialDelay: 10      # default: 0
    failureThreshold: 6   # default: 3
  readiness:
    port: 8602
    path: /health
    initialDelay: 10      # default: 0
    failureThreshold: 6   # default: 3

  accessPolicy:
    outbound:
      external:
        - host: "auth.matrikkel.no"

  databases:
    - name: matrikkel-prodtest
      fields:
        - envName: KART_DB_HOST
          path: host
        - envName: KART_DB_PORT
          path: ports[0].port

  env:
    - name: JAVA_OPTS
      value: "-DALLOW_ENV_PARAMETRIZATION=true"
    - name: GEOSERVER_GEOJSON_LEGACY_CRS
      value: "true"
    - name: KART_DB_DATABASE
      value: "MASY2TST.STATKART.NO"
    - name: KART_DB_SCHEMA
      value: "SYSTEST2_KART"
    - name: KART_DB_USERNAME
      value: "SYSTEST2_KART"
    - name: KART_DB_PASSWORD
      gsmSecretName: "matrikkel-prodtest-geoserver-db-password"

  extraContainers:
    - image: "{{ auth-proxy-image }}"
      name: matrikkel-geoserver-auth-proxy
      additionalPorts:
        - name: auth-proxy
          port: 8602
          protocol: TCP
      ingressPort: 8602
      env:
        - name: KEYCLOAK_ISSUER_URL
          value: "https://kc-prodtest.matrikkel.no/auth/realms/matrikkelen-test"
        - name: KEYCLOAK_CLIENT_ID
          value: "matrikkel-token-exchange"
        - name: ACCEPTED_AUDIENCES
          value: "matrikkel-geoserver"
        - name: GEOSERVER_URL
          value: "http://localhost:8080"
        - name: HEALTH_ENDPOINT
          value: /geoserver/web/wicket/resource/org.geoserver.web.GeoServerBasePage/img/logo.png
        - name: PORT
          value: "8602"